<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tech Strona</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>

body{
    font-family: Inter, sans-serif;
    background:#f5f6fa;
    margin:0;
}

.container{
    max-width:600px;
    margin:auto;
    padding:40px 20px;
}

.page-item{
    background:white;
    padding:14px;
    margin:10px 0;
    border-radius:12px;
    display:flex;
    align-items:center;
    justify-content:center;
    text-decoration:none;
    color:black;
    font-weight:500;
    box-shadow:0 0 8px rgba(0,0,0,0.05);
}

.page-item:hover{
    background:#f0f0f0;
}

.sub-item{
    max-width:85%;
    margin:10px auto;
}

.toggle-section{
    display:none;
}

.title{
    text-align:center;
    font-weight:600;
    margin-bottom:25px;
}

</style>
</head>

<body>

<div class="container">

<h2 class="title">Lista Sprzętu</h2>


<!-- KOMPUTER -->

<a href="#" class="page-item toggle-button" data-target="komputer">
Komputer
</a>

<div id="komputer" class="toggle-section">

<a class="page-item sub-item" href="#">Orange Pi</a>

<a class="page-item sub-item" href="#">Radxa Rock</a>

</div>



<!-- KAMERA -->

<a href="#" class="page-item toggle-button" data-target="kamera">
Kamera
</a>

<div id="kamera" class="toggle-section">

<a class="page-item sub-item" href="#">DJI 3</a>

<a class="page-item sub-item" href="#">DJI 4</a>

<a class="page-item sub-item" href="#">DJI 5</a>

</div>



<!-- ROUTER -->

<a href="#" class="page-item toggle-button" data-target="router">
Router
</a>

<div id="router" class="toggle-section">

<a class="page-item sub-item" href="#">Router 1</a>

<a class="page-item sub-item" href="#">Router 2</a>

</div>



<!-- POWERBANK -->

<a href="#" class="page-item toggle-button" data-target="powerbank">
Powerbank
</a>

<div id="powerbank" class="toggle-section">

<a class="page-item sub-item" href="#">Powerbank 1</a>

<a class="page-item sub-item" href="#">Powerbank 2</a>

</div>



<!-- DODATKI -->

<a href="#" class="page-item toggle-button" data-target="dodatki">
Dodatki
</a>

<div id="dodatki" class="toggle-section">

<a class="page-item sub-item" href="#">Dodatek 1</a>

<a class="page-item sub-item" href="#">Dodatek 2</a>

</div>


</div>



<script>

document.querySelectorAll(".toggle-button").forEach(button => {

button.addEventListener("click", function(e){

e.preventDefault()

const target=this.dataset.target
const section=document.getElementById(target)

section.style.display =
section.style.display==="block" ? "none" : "block"

})

})

</script>

</body>
</html>
